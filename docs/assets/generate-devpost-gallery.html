<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RedPen — Devpost Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./_cute.css">
  <style>body{width:1200px;height:800px;position:relative;}</style>
</head>
<body>
  <div class="background"></div><div class="cute-dots"></div><div class="cute-glow"></div>
  <div class="sparkle p" style="top:70px;left:90px;font-size:30px">✦</div>
  <div class="sparkle" style="top:120px;right:110px;font-size:22px">✦</div>
  <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:52px 70px;width:100%;box-sizing:border-box;gap:12px">
    <img src="../../public/icon.svg" class="cute-mascot" width="210" height="210" alt="">
    <h1 class="cute-title cute-grad" style="font-size:86px;margin-top:4px">RedPen</h1>
    <p class="cute-tag" style="font-size:23px;max-width:780px">Reads a contract clause-by-clause, flags critical risks, and drafts safer language for your approval.</p>
    <div style="display:flex;gap:18px;margin-top:26px;width:100%">
      <div class="cute-card" style="flex:1;padding:26px;text-align:left">
        <span class="cute-card-emoji" style="font-family:'Fredoka';font-weight:700;font-size:22px;color:var(--primary)">1</span>
        <div style="font-family:'Fredoka';font-weight:600;font-size:23px;margin-top:14px">Parse</div>
        <div style="color:var(--text-mid);font-size:15px;margin-top:5px;line-height:1.4">Split into numbered clauses, hashed for integrity.</div>
      </div>
      <div class="cute-card" style="flex:1;padding:26px;text-align:left">
        <span class="cute-card-emoji" style="font-family:'Fredoka';font-weight:700;font-size:22px;color:var(--primary)">2</span>
        <div style="font-family:'Fredoka';font-weight:600;font-size:23px;margin-top:14px">Risk-rate</div>
        <div style="color:var(--text-mid);font-size:15px;margin-top:5px;line-height:1.4">AI flags each clause and drafts a safer alternative.</div>
      </div>
      <div class="cute-card" style="flex:1;padding:26px;text-align:left">
        <span class="cute-card-emoji" style="font-family:'Fredoka';font-weight:700;font-size:22px;color:var(--primary)">3</span>
        <div style="font-family:'Fredoka';font-weight:600;font-size:23px;margin-top:14px">Sign</div>
        <div style="color:var(--text-mid);font-size:15px;margin-top:5px;line-height:1.4">Ed25519-signed memo — on your approval.</div>
      </div>
    </div>
  </div>
</body>
</html>

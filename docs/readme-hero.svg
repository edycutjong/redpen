<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="RedPen — AI contract redliner">
  <defs>
    <linearGradient id="rh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160a0d"/>
      <stop offset="1" stop-color="#26100b"/>
    </linearGradient>
    <linearGradient id="rh-title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a68"/>
      <stop offset="1" stop-color="#ffab4d"/>
    </linearGradient>
    <linearGradient id="rh-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ffe7ea"/>
    </linearGradient>
    <linearGradient id="rh-cap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9900"/><stop offset="1" stop-color="#ff6a00"/>
    </linearGradient>
    <radialGradient id="rh-glow" cx="0.28" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF3344" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FF3344" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#rh-bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#rh-glow)"/>

  <!-- floating particles -->
  <g fill="#FF9900">
    <circle cx="560" cy="84" r="3" opacity="0.5"><animate attributeName="cy" values="84;64;84" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="330" r="4" opacity="0.4"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1190" cy="130" r="3" opacity="0.45" fill="#FF3344"><animate attributeName="cy" values="130;104;130" dur="5.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- mascot: pen -->
  <g transform="translate(150 48) scale(0.62)">
    <path d="M126 408 q44 30 96 8 q52 -22 100 6 q34 20 66 -4" fill="none" stroke="#FF3344" stroke-width="13" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 600; 600 0" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
      <path d="M212 318 h88 l-44 64 z" fill="#FF3344"/>
      <path d="M256 318 v64" stroke="#a51326" stroke-width="4" stroke-linecap="round"/>
      <rect x="208" y="306" width="96" height="18" rx="8" fill="#e2e8f0"/>
      <rect x="206" y="150" width="100" height="164" rx="46" fill="url(#rh-body)"/>
      <rect x="222" y="166" width="14" height="120" rx="7" fill="#ffffff" opacity="0.7"/>
      <path d="M206 196 a46 46 0 0 1 92 0 v8 h-92 z" fill="url(#rh-cap)"/>
      <rect x="248" y="150" width="14" height="58" rx="7" fill="#ff6a00"/>
      <circle cx="222" cy="252" r="11" fill="#FF3344" opacity="0.35"/>
      <circle cx="290" cy="252" r="11" fill="#FF3344" opacity="0.35"/>
      <ellipse cx="238" cy="244" rx="10" ry="11" fill="#27121a"><animate attributeName="ry" values="11;11;1.4;11;11" keyTimes="0;0.9;0.94;0.98;1" dur="4.3s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="274" cy="244" rx="10" ry="11" fill="#27121a"><animate attributeName="ry" values="11;11;1.4;11;11" keyTimes="0;0.9;0.94;0.98;1" dur="4.3s" repeatCount="indefinite"/></ellipse>
      <circle cx="241" cy="240" r="3.3" fill="#fff"/>
      <circle cx="277" cy="240" r="3.3" fill="#fff"/>
      <path d="M244 260 q12 11 24 0" fill="none" stroke="#27121a" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="500" y="172" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="92" font-weight="800" fill="url(#rh-title)" letter-spacing="-2">RedPen</text>
  <!-- redline underlining the title -->
  <path d="M504 196 q150 22 318 2" fill="none" stroke="#FF3344" stroke-width="7" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0 400;400 0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0.15" keyTimes="0;0.12;0.8;1" dur="3s" repeatCount="indefinite"/>
  </path>
  <text x="504" y="246" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="27" font-weight="500" fill="#e7c4bf">AI contract redliner — built on Anna</text>

  <!-- feature pills -->
  <g font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="20" font-weight="600">
    <g><rect x="504" y="284" width="150" height="44" rx="22" fill="#2a1013" stroke="#FF3344" stroke-opacity="0.45"/><text x="579" y="312" fill="#ff9aa3" text-anchor="middle">Anna App</text></g>
    <g><rect x="666" y="284" width="186" height="44" rx="22" fill="#2a1709" stroke="#FF9900" stroke-opacity="0.45"/><text x="759" y="312" fill="#ffc680" text-anchor="middle">AES-GCM-256</text></g>
    <g><rect x="864" y="284" width="128" height="44" rx="22" fill="#2a1013" stroke="#FF3344" stroke-opacity="0.45"/><text x="928" y="312" fill="#ff9aa3" text-anchor="middle">Ed25519</text></g>
    <g><rect x="1004" y="284" width="120" height="44" rx="22" fill="#2a1709" stroke="#FF9900" stroke-opacity="0.45"/><text x="1064" y="312" fill="#ffc680" text-anchor="middle">APS KV</text></g>
  </g>

  <!-- sparkles -->
  <path d="M474 92 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5z" fill="#FF9900"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/></path>
  <path d="M1216 300 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4z" fill="#FF3344"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" begin="1.1s" repeatCount="indefinite"/></path>
</svg>
